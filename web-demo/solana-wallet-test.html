<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solana Wallet Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #1a1a2e;
      margin-bottom: 8px;
      font-size: 28px;
    }
    .status {
      padding: 12px;
      border-radius: 8px;
      margin: 16px 0;
      font-size: 14px;
    }
    .status.connected {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #10b981;
    }
    .status.disconnected {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #ef4444;
    }
    .wallet-info {
      background: #f3f4f6;
      padding: 16px;
      border-radius: 8px;
      margin: 16px 0;
      word-break: break-all;
    }
    .wallet-info label {
      display: block;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
      font-size: 14px;
    }
    .wallet-info .value {
      font-family: 'Courier New', monospace;
      color: #6366f1;
      font-size: 13px;
    }
    button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:active {
      transform: scale(0.98);
    }
    .btn-primary {
      background: #6366f1;
      color: white;
    }
    .btn-primary:hover {
      background: #4f46e5;
    }
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }
    .btn-secondary:hover {
      background: #e5e7eb;
    }
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    .btn-danger:hover {
      background: #dc2626;
    }
    .log {
      margin-top: 24px;
      padding: 16px;
      background: #1f2937;
      border-radius: 8px;
      color: #f3f4f6;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
    }
    .log-entry {
      margin: 4px 0;
      padding: 4px 0;
      border-bottom: 1px solid #374151;
    }
    .log-entry:last-child {
      border-bottom: none;
    }
    .log-time {
      color: #9ca3af;
      margin-right: 8px;
    }
    .log-success {
      color: #10b981;
    }
    .log-error {
      color: #ef4444;
    }
    .section {
      margin: 24px 0;
      padding-top: 24px;
      border-top: 1px solid #e5e7eb;
    }
    .section:first-child {
      border-top: none;
      padding-top: 0;
    }
    .section h2 {
      font-size: 18px;
      color: #374151;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Solana Wallet Test</h1>
    <p style="color: #6b7280; margin-bottom: 16px;">Test Solana Mobile Wallet integration</p>

    <div id="status" class="status disconnected">
      ⚠️ Wallet not connected
    </div>

    <div onclick="openNewPage()">open new page</div>

    <div id="walletInfo" style="display: none;" class="wallet-info">
      <label>Public Key:</label>
      <div class="value" id="publicKey">-</div>
    </div>

    <div class="section">
      <h2>Connection</h2>
      <button id="connectBtn" class="btn-primary" onclick="connectWallet()">
        Connect Wallet
      </button>
      <button id="disconnectBtn" class="btn-danger" onclick="disconnectWallet()" style="display: none;">
        Disconnect
      </button>
    </div>



    <div class="section">
      <h2>Sign Message</h2>
      <button class="btn-secondary" onclick="signMessage()">
        Sign Test Message
      </button>
    </div>

    <div class="section">
      <h2>Sign Transaction</h2>
      <button class="btn-secondary" onclick="testSignTransaction()">
        Sign Transaction (Test)
      </button>
    </div>

    <div class="section">
      <h2>Send Transaction</h2>
      <button class="btn-secondary" onclick="testSendTransaction()">
        Send 0.000001 SOL (Test)
      </button>
    </div>

    <div class="log" id="log">
      <div class="log-entry">Waiting for wallet operations...</div>
    </div>
  </div>

  <script>
    let wallet = null;
    let connectedAccount = null;
    const MOCK_TRANSACTION_BASE64 = 'AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAACAAQABAxU2F0gW3HY2nt+7vFRmjBBXYOj0lT4e9GgQQQAAAAAGp9UXGSxWjuCKhF9z0peIzwNcMUWyGrNE2AYuqUAAAABxsVKsRpLIGlGkJhJF6KMXPzCfvLJvKFqJQAAAAAAAAACAAQICAAEMAgAAAABAQg8AAAAAAA==';

    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const colorClass = type === 'success' ? 'log-success' : (type === 'error' ? 'log-error' : '');
      logDiv.innerHTML = `<div class="log-entry"><span class="log-time">[${time}]</span><span class="${colorClass}">${message}</span></div>` + logDiv.innerHTML;
    }

    function updateUI() {
      const status = document.getElementById('status');
      const walletInfo = document.getElementById('walletInfo');
      const publicKeyDiv = document.getElementById('publicKey');
      const connectBtn = document.getElementById('connectBtn');
      const disconnectBtn = document.getElementById('disconnectBtn');

      if (wallet && wallet.connected && wallet.publicKey) {
        status.className = 'status connected';
        status.textContent = '✅ Wallet connected';
        walletInfo.style.display = 'block';
        publicKeyDiv.textContent = wallet.publicKey.toBase58();
        connectBtn.style.display = 'none';
        disconnectBtn.style.display = 'block';
      } else {
        status.className = 'status disconnected';
        status.textContent = '⚠️ Wallet not connected';
        walletInfo.style.display = 'none';
        connectBtn.style.display = 'block';
        disconnectBtn.style.display = 'none';
      }
    }

    function openNewPage() {
      window.open('/solana-wallet-test.html', '_blank');
    }

    async function connectWallet() {
      try {
        log('Connecting to wallet...', 'info');
        const account = await wallet.connect();
        connectedAccount = account;
        log('✓ Wallet connected successfully!', 'success');
        
        if (account && account.address) {
          log(`Public Key: ${account.address.toString()}`, 'success');
        } else if (wallet.publicKey) {
          log(`Public Key: ${wallet.publicKey.toBase58()}`, 'success');
        }
        
        updateUI();
      } catch (error) {
        log(`✗ Connection failed: ${error.message}`, 'error');
      }
    }

    async function disconnectWallet() {
      try {
        log('Disconnecting wallet...', 'info');
        await wallet.disconnect();
        connectedAccount = null;
        log('✓ Wallet disconnected', 'success');
        updateUI();
      } catch (error) {
        log(`✗ Disconnect failed: ${error.message}`, 'error');
      }
    }

    async function signMessage() {
      if (!wallet || !wallet.connected) {
        log('✗ Please connect wallet first', 'error');
        return;
      }

      try {
        log('Signing message...', 'info');
        const message = 'Hello from Rhea Finance! Timestamp: ' + Date.now();
        const encodedMessage = new TextEncoder().encode(message);
        const signature = await wallet.signMessage(encodedMessage);
        log('✓ Message signed successfully!', 'success');
        log(`Signature: ${signature.signature}`, 'success');
      } catch (error) {
        log(`✗ Signing failed: ${error.message}`, 'error');
      }
    }

    async function testSignTransaction() {
      if (!wallet || !wallet.connected) {
        log('✗ Please connect wallet first', 'error');
        return;
      }

      try {
        log('Testing signTransaction with mock transaction...', 'info');
        log('Mock transaction (0.000001 SOL transfer)', 'info');
        
        const txBytes = Uint8Array.from(atob(MOCK_TRANSACTION_BASE64), c => c.charCodeAt(0));
        const mockTransaction = {
          serialize: function() {
            return txBytes;
          }
        };
        
        log('Calling signTransaction...', 'info');
        const signedTx = await wallet.signTransaction(mockTransaction);
        
        log('✓ Transaction signed successfully!', 'success');
        log('Signed transaction length: ' + signedTx.length + ' bytes', 'success');
      } catch (error) {
        log('✗ Sign transaction failed: ' + error.message, 'error');
        console.error(error);
      }
    }

    async function testSendTransaction() {
      if (!wallet || !wallet.connected) {
        log('✗ Please connect wallet first', 'error');
        return;
      }

      try {
        log('Testing sendTransaction with mock transaction...', 'info');
        log('Mock transaction (0.000001 SOL transfer)', 'info');
        
        const txBytes = Uint8Array.from(atob(MOCK_TRANSACTION_BASE64), c => c.charCodeAt(0));
        const mockTransaction = {
          serialize: function() {
            return txBytes;
          }
        };
        
        log('Calling sendTransaction...', 'info');
        const signature = await wallet.sendTransaction(mockTransaction, null, {
          skipPreflight: false
        });
        
        log('✓ Transaction sent successfully!', 'success');
        log('Signature: ' + signature, 'success');
      } catch (error) {
        log('✗ Send transaction failed: ' + error.message, 'error');
        console.error(error);
      }
    }

    // Initialize
    window.addEventListener('load', function() {
      if (window.solanaWallet) {
        wallet = window.solanaWallet;
        log('✓ Solana wallet bridge detected', 'success');
        
        // Listen for wallet events
        wallet.on('connect', () => {
          log('Event: Wallet connected', 'success');
          updateUI();
        });
        
        wallet.on('disconnect', () => {
          log('Event: Wallet disconnected', 'info');
          updateUI();
        });
        
        wallet.on('accountChanged', (data) => {
          log('Event: Account changed', 'info');
          updateUI();
        });

        updateUI();
      } else {
        log('✗ Solana wallet bridge not found', 'error');
        log('Waiting for window.solanaWallet...', 'info');
        
        // Try again after a delay
        setTimeout(() => {
          if (window.solanaWallet) {
            wallet = window.solanaWallet;
            log('✓ Solana wallet bridge detected (delayed)', 'success');
            updateUI();
          } else {
            log('✗ Still no wallet bridge detected', 'error');
          }
        }, 1000);
      }
    });

    // Also listen for the ready event
    window.addEventListener('solanaWalletReady', function() {
      log('Event: solanaWalletReady fired', 'success');
      if (window.solanaWallet && !wallet) {
        wallet = window.solanaWallet;
        updateUI();
      }
    });
  </script>
</body>
</html>
