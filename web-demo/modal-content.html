<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supply Details</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e5e7eb;
      padding: 20px;
    }

    .token-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .token-icon {
      width: 48px;
      height: 48px;
      border-radius: 24px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .token-name {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .token-chain {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }

    .info-card {
      background: #0d0d17;
      border: 1px solid #2d2d44;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #1a1a2e;
    }
    .info-row:last-child { border-bottom: none; }

    .info-label {
      color: #6b7280;
      font-size: 14px;
    }

    .info-value {
      color: #e5e7eb;
      font-size: 14px;
      font-weight: 600;
    }
    .info-value.highlight {
      color: #34d399;
    }

    .input-group {
      margin-bottom: 16px;
    }
    .input-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .input-field {
      width: 100%;
      padding: 12px;
      background: #0d0d17;
      border: 1px solid #2d2d44;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      outline: none;
    }
    .input-field:focus {
      border-color: #6366f1;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-submit {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
    }
    .btn-cancel {
      background: #2d2d44;
      color: #9ca3af;
      margin-top: 8px;
    }
    .btn:active { opacity: 0.8; }

    .status {
      text-align: center;
      padding: 12px;
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>
<body>

  <div id="loading" class="status">正在加载数据...</div>
  <div id="content" style="display:none">
    <div class="token-header">
      <div class="token-icon" id="token-icon">U</div>
      <div>
        <div class="token-name" id="token-name">USDC</div>
        <div class="token-chain" id="token-chain">Ethereum</div>
      </div>
    </div>

    <div class="info-card">
      <div class="info-row">
        <span class="info-label">Supply APY</span>
        <span class="info-value highlight" id="token-apy">5.2%</span>
      </div>
      <div class="info-row">
        <span class="info-label">Total Value Locked</span>
        <span class="info-value" id="token-tvl">$12.5M</span>
      </div>
      <div class="info-row">
        <span class="info-label">Network</span>
        <span class="info-value" id="token-network">Ethereum</span>
      </div>
    </div>

    <div class="input-group">
      <div class="input-label">Supply Amount</div>
      <input class="input-field" type="number" placeholder="0.00" id="amount-input">
    </div>

    <button class="btn btn-submit" onclick="handleSubmit()">Confirm Supply</button>
    <button class="btn btn-cancel" onclick="handleClose()">Cancel</button>
  </div>

<script>
  // 接收从 RN 传入的数据
  // 在真实场景中，数据通过 URL query params 或 RheaBridge 传递

  // 方式一：从 URL 参数读取
  function getUrlParams() {
    var params = {};
    var search = window.location.search.substring(1);
    if (search) {
      search.split('&').forEach(function(pair) {
        var kv = pair.split('=');
        params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
      });
    }
    return params;
  }

  // 方式二：从 hash 中读取 JSON 数据（RN 端可将 data 编码后附到 URL hash）
  function getHashData() {
    try {
      var hash = window.location.hash.substring(1);
      if (hash) return JSON.parse(decodeURIComponent(hash));
    } catch(e) {}
    return null;
  }

  // 初始化
  function init() {
    var data = getHashData() || getUrlParams();

    // 有数据则展示，否则用默认值
    if (data.token) {
      document.getElementById('token-icon').textContent = data.token.charAt(0);
      document.getElementById('token-name').textContent = data.token;
    }
    if (data.chain) {
      document.getElementById('token-chain').textContent = data.chain;
      document.getElementById('token-network').textContent = data.chain;
    }
    if (data.apy) {
      document.getElementById('token-apy').textContent = data.apy;
    }
    if (data.tvl) {
      document.getElementById('token-tvl').textContent = data.tvl;
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  }

  function handleSubmit() {
    var amount = document.getElementById('amount-input').value;
    alert('Supply ' + amount + ' ' + (document.getElementById('token-name').textContent));
    // 调用 RheaBridge.closeModal() 关闭
    if (window.RheaBridge) {
      RheaBridge.closeModal();
    }
  }

  function handleClose() {
    if (window.RheaBridge) {
      RheaBridge.closeModal();
    } else {
      // 浏览器环境下的 fallback
      window.close();
    }
  }

  init();
</script>
</body>
</html>
